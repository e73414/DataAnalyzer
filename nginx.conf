server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Increase client body size for large requests
    client_max_body_size 50M;

    # Proxy to MCP adapters (using Docker container names)
    location /mcp-n8n/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_mcp_n8n mcp-n8n:3000;
        rewrite ^/mcp-n8n/(.*) /$1 break;
        proxy_pass http://$upstream_mcp_n8n;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Extended timeouts for AI processing (5 minutes)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering for long-running requests
        proxy_buffering off;
        proxy_request_buffering off;

        # Keep connection alive
        keepalive_timeout 300s;
    }

    # SPA route: /mcp-answers page (browser navigation — serve index.html)
    location = /mcp-answers {
        try_files /index.html =404;
    }

    # Proxy to MCP Answers API (only subpaths like /query, /healthz)
    location /mcp-answers/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_mcp_answers mcp-answers:3003;
        rewrite ^/mcp-answers/(.*) /$1 break;
        proxy_pass http://$upstream_mcp_answers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Proxy to Excel → SQL converter API
    location /excel-to-sql/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_excel excel-to-sql:8000;
        rewrite ^/excel-to-sql/(.*) /$1 break;
        proxy_pass http://$upstream_excel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
